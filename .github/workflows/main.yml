name: CD / Main Merge

# Every merge to main: lint → test → determine next semver → build all bots
# → push :vX.Y.Z + :latest + :sha-<sha> → create git tag → GitHub Release
# → deploy.yml fires automatically via the published release event.
#
# Version bump is derived from the conventional commit title:
#   feat!: / BREAKING CHANGE  → major  (X+1.0.0)
#   feat:                     → minor  (X.Y+1.0)
#   anything else             → patch  (X.Y.Z+1)
#
# workflow_dispatch rebuilds everything and defaults to a patch bump.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:

  # ─── Validate DevOps consistency ─────────────────────────────────────────────
  validate_devops:
    name: Validate DevOps Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all DevOps files are in sync
        run: bash scripts/devops-validate.sh

  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false  # golangci-lint manages its own cache

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  # ─── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [validate_devops, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v

  # ─── Determine next semver ────────────────────────────────────────────────────
  #
  # Reads the latest v* git tag and the merge commit title to compute the next
  # version. Falls back to v0.0.0 when no tags exist yet.
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    needs: [validate_devops, lint, test]
    outputs:
      version:  ${{ steps.bump.outputs.version }}
      previous: ${{ steps.bump.outputs.previous }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version from conventional commit
        id: bump
        run: |
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)
          PREVIOUS="${LATEST:-v0.0.0}"
          VER="${PREVIOUS#v}"
          MA=$(echo "$VER" | cut -d. -f1)
          MI=$(echo "$VER" | cut -d. -f2)
          PA=$(echo "$VER" | cut -d. -f3)

          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qE '^(feat|fix|chore|refactor|docs|test)(\(.+\))?!:|BREAKING CHANGE'; then
            NEW="$((MA+1)).0.0"
            BUMP="major"
          elif echo "$MSG" | grep -qE '^feat(\(.+\))?:'; then
            NEW="${MA}.$((MI+1)).0"
            BUMP="minor"
          else
            NEW="${MA}.${MI}.$((PA+1))"
            BUMP="patch"
          fi

          echo "version=v${NEW}" >> $GITHUB_OUTPUT
          echo "previous=${PREVIOUS}" >> $GITHUB_OUTPUT
          echo "Next version: v${NEW} (${BUMP} bump from ${PREVIOUS})"

  # ─── Build and push Docker images (all bots) ─────────────────────────────────
  #
  # Always rebuilds all 5 bots so every release ships a coherent image set at
  # the same version. Tags: :vX.Y.Z  :latest  :sha-<short-sha>
  docker_publish:
    name: Docker Publish / ${{ matrix.bot }}
    runs-on: ubuntu-latest
    needs: [version]
    strategy:
      fail-fast: false
      matrix:
        bot: [bluebot, bunkbot, covabot, djcova, ratbot]
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        run: |
          BOT=${{ matrix.bot }}
          VERSION=${{ needs.version.outputs.version }}
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/starbunk-go-${BOT}"

          docker build \
            -f docker/Dockerfile \
            --build-arg BOT_NAME="${BOT}" \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:sha-${SHORT_SHA}" \
            .

          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:sha-${SHORT_SHA}"
          echo "Published ${IMAGE}:${VERSION}, :latest, :sha-${SHORT_SHA}"

  # ─── Tag + release ────────────────────────────────────────────────────────────
  #
  # Creates the semver git tag and a GitHub Release. The published release event
  # triggers deploy.yml automatically.
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, docker_publish]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          VERSION=${{ needs.version.outputs.version }}
          git tag "$VERSION" "${{ github.sha }}" -m "Release ${VERSION}"
          git push origin "$VERSION"
          echo "Created tag: ${VERSION}"

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ needs.version.outputs.version }}
          PREVIOUS=${{ needs.version.outputs.previous }}
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          if [ "$PREVIOUS" != "v0.0.0" ]; then
            CHANGES=$(git log --oneline "${PREVIOUS}..HEAD" \
              | grep -v 'Merge pull request' \
              | head -30 \
              | sed 's/^/- /' || true)
            RANGE="${PREVIOUS}..${VERSION}"
          else
            CHANGES="- Initial release"
            RANGE="${VERSION}"
          fi

          {
            echo "NOTES<<RELEASE_EOF"
            echo "## Docker Images"
            echo ""
            for bot in bluebot bunkbot covabot djcova ratbot; do
              echo "- \`ghcr.io/${OWNER_LC}/starbunk-go-${bot}:${VERSION}\`"
            done
            echo ""
            echo "## Changes (${RANGE})"
            echo ""
            echo "${CHANGES}"
            echo "RELEASE_EOF"
          } >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.version.outputs.version }}
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "${{ steps.notes.outputs.NOTES }}" \
            --latest
          echo "Created release: ${VERSION}"
