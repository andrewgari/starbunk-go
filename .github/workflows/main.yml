name: CD / Main Merge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:

  # ─── Detect which bots changed ───────────────────────────────────────────────
  detect_changes:
    name: Detect Changed Bots
    runs-on: ubuntu-latest
    # Skip when the build-tag commit itself triggers the workflow.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip ci]')
    outputs:
      bots: ${{ steps.matrix.outputs.bots }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            bluebot:
              - 'cmd/bluebot/**'
            bunkbot:
              - 'cmd/bunkbot/**'
            covabot:
              - 'cmd/covabot/**'
            djcova:
              - 'cmd/djcova/**'
            ratbot:
              - 'cmd/ratbot/**'
            internal:
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'
              - 'docker/Dockerfile'

      - name: Build bot matrix
        id: matrix
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo 'bots=["bluebot","bunkbot","covabot","djcova","ratbot"]' >> $GITHUB_OUTPUT
            exit 0
          fi

          BOTS=()
          # Internal/shared changes (internal/, go.mod, Dockerfile) rebuild all bots.
          if [ "${{ steps.filter.outputs.internal }}" == "true" ]; then
            BOTS=("bluebot" "bunkbot" "covabot" "djcova" "ratbot")
          else
            [[ "${{ steps.filter.outputs.bluebot }}" == "true" ]] && BOTS+=("bluebot")
            [[ "${{ steps.filter.outputs.bunkbot }}" == "true" ]] && BOTS+=("bunkbot")
            [[ "${{ steps.filter.outputs.covabot }}" == "true" ]] && BOTS+=("covabot")
            [[ "${{ steps.filter.outputs.djcova }}"  == "true" ]] && BOTS+=("djcova")
            [[ "${{ steps.filter.outputs.ratbot }}"  == "true" ]] && BOTS+=("ratbot")
          fi

          if [ ${#BOTS[@]} -eq 0 ]; then
            # CI/root files only — rebuild all as safety net.
            echo 'bots=["bluebot","bunkbot","covabot","djcova","ratbot"]' >> $GITHUB_OUTPUT
          else
            BOTS_JSON=$(printf '%s\n' "${BOTS[@]}" | jq -R . | jq -sc .)
            echo "bots=$BOTS_JSON" >> $GITHUB_OUTPUT
          fi

  # ─── DevOps consistency gate ─────────────────────────────────────────────────
  validate_devops:
    name: Validate DevOps Consistency
    runs-on: ubuntu-latest
    needs: detect_changes
    steps:
      - uses: actions/checkout@v4
      - name: Check all DevOps files are in sync
        run: bash scripts/devops-validate.sh

  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect_changes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false  # golangci-lint manages its own cache

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  # ─── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [detect_changes, validate_devops, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v

  # ─── Docker publish (only changed bots) ──────────────────────────────────────
  docker_publish:
    name: Docker Publish / ${{ matrix.bot }}
    runs-on: ubuntu-latest
    needs: [detect_changes, validate_devops, lint, test]
    strategy:
      fail-fast: false
      matrix:
        bot: ${{ fromJson(needs.detect_changes.outputs.bots) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Compute content hash
        run: |
          BOT=${{ matrix.bot }}
          SRC_HASH=$(git rev-parse HEAD:cmd/${BOT} 2>/dev/null || echo "no-hash")
          INT_HASH=$(git rev-parse HEAD:internal 2>/dev/null || echo "no-internal")
          MOD_HASH=$(sha256sum go.sum | cut -d' ' -f1 | head -c 12)
          echo "CONTENT_HASH=${SRC_HASH:0:12}-${INT_HASH:0:12}-${MOD_HASH}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        run: |
          BOT=${{ matrix.bot }}
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/starbunk-go-${BOT}"

          if docker manifest inspect "${IMAGE}:sha-${CONTENT_HASH}" > /dev/null 2>&1; then
            echo "Identical image already exists (${CONTENT_HASH}). Retagging."
            docker pull "${IMAGE}:sha-${CONTENT_HASH}"
            docker tag "${IMAGE}:sha-${CONTENT_HASH}" "${IMAGE}:main"
            docker push "${IMAGE}:main"
          else
            echo "Building ${IMAGE}:main"
            docker build \
              -f docker/Dockerfile \
              --build-arg BOT_NAME="${BOT}" \
              -t "${IMAGE}:main" \
              -t "${IMAGE}:sha-${CONTENT_HASH}" \
              .
            docker push "${IMAGE}:main"
            docker push "${IMAGE}:sha-${CONTENT_HASH}"
          fi

          docker tag "${IMAGE}:main" "${IMAGE}:sha-${SHORT_SHA}"
          docker push "${IMAGE}:sha-${SHORT_SHA}"

  # ─── Create git build tag ────────────────────────────────────────────────────
  tag_release:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: [detect_changes, validate_devops, lint, test, docker_publish]
    outputs:
      build_tag: ${{ steps.create_build_tag.outputs.build_tag }}
    if: >-
      always() &&
      !cancelled() &&
      needs.detect_changes.result == 'success' &&
      needs.validate_devops.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Create build tag
        id: create_build_tag
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BUILD_TAG="build-$(date +%Y%m%d)-${SHORT_SHA}"
          git tag "$BUILD_TAG" -m "CI build ${GITHUB_RUN_NUMBER} from ${GITHUB_SHA:0:7}"
          git push origin "$BUILD_TAG"
          echo "build_tag=$BUILD_TAG" >> $GITHUB_OUTPUT
          echo "Created build tag: ${BUILD_TAG}"

