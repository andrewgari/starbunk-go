name: Deploy to Production

# Push-based deployment: runner joins the tailnet via Tailscale OAuth,
# then SSHs into Tower using a deploy key to run deploy.sh + health-check.sh.
#
# Triggered by a GitHub Release published from the CD / Main Merge workflow.
# The release is created only after images are successfully built and tagged :latest.
#
# Required secrets (production environment):
#   TAILSCALE_OAUTH_CLIENT_ID      — Tailscale OAuth client ID (tag:ci)
#   TAILSCALE_OAUTH_CLIENT_SECRET  — Tailscale OAuth client secret
#   SSH_PRIVATE_KEY                — Private key in Tower's authorized_keys
#   SSH_HOST                       — Tower's Tailscale IP (100.x.x.x)
#   SSH_USER                       — SSH user on Tower (e.g. root)
#
# Required variables (production environment):
#   PROD_DOCKER_COMPOSE_DIR        — Path on Tower where docker-compose.yml lives

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production
  cancel-in-progress: false  # never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'release' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Set deploy version
        id: deploy_info
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          if [ -z "$VERSION" ]; then
            VERSION="manual-${SHORT_SHA}"
            DEPLOY_TAG="latest"
          else
            DEPLOY_TAG="${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "deploy_tag=${DEPLOY_TAG}" >> $GITHUB_OUTPUT

      - name: Preflight — check required secrets
        env:
          CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
          COMPOSE_DIR: ${{ vars.PROD_DOCKER_COMPOSE_DIR }}
        run: |
          MISSING=""
          [[ -z "$CLIENT_ID" ]]     && MISSING="$MISSING TAILSCALE_OAUTH_CLIENT_ID"
          [[ -z "$CLIENT_SECRET" ]] && MISSING="$MISSING TAILSCALE_OAUTH_CLIENT_SECRET"
          [[ -z "$KEY" ]]           && MISSING="$MISSING SSH_PRIVATE_KEY"
          [[ -z "$HOST" ]]          && MISSING="$MISSING SSH_HOST"
          [[ -z "$USER" ]]          && MISSING="$MISSING SSH_USER"
          [[ -z "$COMPOSE_DIR" ]]   && MISSING="$MISSING PROD_DOCKER_COMPOSE_DIR"
          if [[ -n "$MISSING" ]]; then
            echo "::error::Missing required secrets/variables:$MISSING"
            exit 1
          fi

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Verify connectivity to Tower
        run: tailscale ping --c 3 "${{ secrets.SSH_HOST }}"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Stage docker-compose.yml on Tower
        run: |
          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            docker-compose.yml \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.PROD_DOCKER_COMPOSE_DIR }}/docker-compose.yml.incoming"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "bash -s -- ${{ vars.PROD_DOCKER_COMPOSE_DIR }} ${{ steps.deploy_info.outputs.deploy_tag }} ${{ steps.deploy_info.outputs.version }} ${{ vars.PROD_DOCKER_COMPOSE_DIR }}/docker-compose.yml.incoming" \
            < scripts/deployment/deploy.sh

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "bash -s -- ${{ vars.PROD_DOCKER_COMPOSE_DIR }}" \
            < scripts/deployment/health-check.sh
