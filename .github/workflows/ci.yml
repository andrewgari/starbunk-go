name: CI / Pull Request

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate_devops:
    name: Validate DevOps Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all DevOps files are in sync
        run: bash scripts/devops-validate.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v

  build:
    name: Build / ${{ matrix.bot }}
    runs-on: ubuntu-latest
    needs: [validate_devops, test]
    strategy:
      fail-fast: false
      matrix:
        bot: [bluebot, bunkbot, covabot, djcova, ratbot]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.bot }}
        run: go build -o /dev/null ./cmd/${{ matrix.bot }}
