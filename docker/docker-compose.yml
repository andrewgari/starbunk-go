version: "3.8"
name: starbunk-go

services:
  bluebot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BOT_NAME: bluebot
    container_name: starbunk-go-bluebot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${BLUEBOT_TOKEN:-${STARBUNK_TOKEN}}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bunkbot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BOT_NAME: bunkbot
    container_name: starbunk-go-bunkbot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${BUNKBOT_TOKEN:-${STARBUNK_TOKEN}}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  covabot:
