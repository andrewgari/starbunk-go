      context: ..
      dockerfile: docker/Dockerfile
      args:
        BOT_NAME: covabot
    container_name: starbunk-go-covabot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${COVABOT_TOKEN:-${STARBUNK_TOKEN}}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  djcova:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BOT_NAME: djcova
    container_name: starbunk-go-djcova
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DJCOVA_TOKEN:-${STARBUNK_TOKEN}}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ratbot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BOT_NAME: ratbot
    container_name: starbunk-go-ratbot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${RATBOT_TOKEN:-${STARBUNK_TOKEN}}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
